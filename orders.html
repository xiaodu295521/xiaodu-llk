<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的订单 - 卡速购</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = { theme: { extend: { colors: { shop: { red: '#e1251b', orange: '#ff7a00', dark: '#1f2329', soft: '#fff6f0', line: '#f3dfd6' } } } } };
  </script>
  <style>
    body {
      font-family: "Noto Sans SC", sans-serif;
      background: radial-gradient(circle at top left, rgba(255,122,0,.14), transparent 22%), radial-gradient(circle at top right, rgba(225,37,27,.10), transparent 26%), linear-gradient(180deg, #fff9f6 0%, #fff 40%, #fffaf8 100%);
      color: #1f2329;
    }
  </style>
</head>
<body class="min-h-screen">
  <header class="border-b border-white/70 bg-white/90 backdrop-blur-xl">
    <nav class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
      <a href="index.html" class="flex items-center gap-3">
        <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-shop-red to-shop-orange text-lg font-extrabold text-white shadow-lg">卡</div>
        <div><p class="text-lg font-extrabold text-shop-dark">卡速购</p><p class="text-xs text-gray-500">手机流量卡优选商城</p></div>
      </a>
      <div class="flex items-center gap-3">
        <a href="profile.html" class="text-sm font-semibold text-gray-600 hover:text-shop-red">个人中心</a>
        <a href="index.html#plans" class="text-sm font-semibold text-gray-600 hover:text-shop-red">继续选购</a>
        <a id="adminLink" href="admin.html" class="hidden text-sm font-semibold text-gray-600 hover:text-shop-red">管理后台</a>
      </div>
    </nav>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <section class="rounded-[32px] bg-gradient-to-r from-shop-red via-shop-orange to-[#ff9e39] p-1 shadow-lg">
      <div class="rounded-[30px] bg-white/95 px-6 py-8 sm:px-8">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
          <div>
            <p class="text-sm font-extrabold uppercase tracking-[0.24em] text-shop-red">Orders</p>
            <h1 class="mt-3 text-3xl font-extrabold text-gray-900 sm:text-4xl">我的订单</h1>
            <p class="mt-3 max-w-2xl text-base leading-7 text-gray-600">这里展示当前账号的扫码支付订单。付款后订单会进入“已付款待确认”，等待管理员人工核实到账。</p>
          </div>
          <a href="index.html#plans" class="inline-flex items-center justify-center rounded-full bg-shop-dark px-6 py-3 text-sm font-bold text-white hover:bg-shop-red">继续购买</a>
        </div>
      </div>
    </section>

    <section class="mt-8 grid gap-4 sm:grid-cols-4">
      <div class="rounded-3xl border border-shop-line bg-white p-5 shadow-lg"><p class="text-sm text-gray-500">全部订单</p><p id="statsTotal" class="mt-2 text-3xl font-extrabold text-shop-dark">0</p></div>
      <div class="rounded-3xl border border-shop-line bg-white p-5 shadow-lg"><p class="text-sm text-gray-500">待支付</p><p id="statsPending" class="mt-2 text-3xl font-extrabold text-red-600">0</p></div>
      <div class="rounded-3xl border border-shop-line bg-white p-5 shadow-lg"><p class="text-sm text-gray-500">待确认</p><p id="statsPaidPending" class="mt-2 text-3xl font-extrabold text-amber-600">0</p></div>
      <div class="rounded-3xl border border-shop-line bg-white p-5 shadow-lg"><p class="text-sm text-gray-500">已完成</p><p id="statsCompleted" class="mt-2 text-3xl font-extrabold text-emerald-600">0</p></div>
    </section>

    <section class="mt-8 rounded-[32px] border border-shop-line bg-white p-6 shadow-lg sm:p-8">
      <div class="flex flex-wrap gap-3">
        <button class="filter-btn rounded-full bg-shop-dark px-5 py-2.5 text-sm font-bold text-white" data-filter="all">全部</button>
        <button class="filter-btn rounded-full border border-gray-200 px-5 py-2.5 text-sm font-bold text-gray-700" data-filter="pending">待支付</button>
        <button class="filter-btn rounded-full border border-gray-200 px-5 py-2.5 text-sm font-bold text-gray-700" data-filter="paid_pending_confirm">已付款待确认</button>
        <button class="filter-btn rounded-full border border-gray-200 px-5 py-2.5 text-sm font-bold text-gray-700" data-filter="completed">已完成</button>
      </div>
      <div id="ordersList" class="mt-8 space-y-5"></div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script>
    const ORDER_STATUS = window.KasuAuth.ORDER_STATUS;
    const filterButtons = document.querySelectorAll('.filter-btn');
    const adminLink = document.getElementById('adminLink');
    let activeFilter = 'all';

    function formatDateTime(value) {
      const date = new Date(value);
      return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0') + ' ' + String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
    }

    async function renderStats() {
      const stats = await window.KasuAuth.getOrderStats();
      document.getElementById('statsTotal').textContent = stats.total;
      document.getElementById('statsPending').textContent = stats.pending;
      document.getElementById('statsPaidPending').textContent = stats.paidPendingConfirm;
      document.getElementById('statsCompleted').textContent = stats.completed;
    }

    function buildAction(order) {
      if (order.status === ORDER_STATUS.PENDING) {
        return '<span class="inline-flex items-center justify-center rounded-full bg-red-50 px-5 py-2.5 text-sm font-bold text-red-600">请回首页扫码支付</span>';
      }
      if (order.status === ORDER_STATUS.PAID_PENDING_CONFIRM) {
        return '<span class="inline-flex items-center justify-center rounded-full bg-amber-50 px-5 py-2.5 text-sm font-bold text-amber-600">等待管理员确认收款</span>';
      }
      return '<a href="index.html#plans" class="inline-flex items-center justify-center rounded-full border border-gray-200 px-5 py-2.5 text-sm font-bold text-gray-700 hover:border-shop-red hover:text-shop-red">再次购买</a>';
    }

    async function renderOrders() {
      const allOrders = await window.KasuAuth.getCurrentUserOrders();
      const orders = activeFilter === 'all' ? allOrders : allOrders.filter(function (order) { return order.status === activeFilter; });
      const ordersList = document.getElementById('ordersList');
      if (!orders.length) {
        ordersList.innerHTML = '<div class="rounded-3xl bg-shop-soft p-8 text-center"><p class="text-lg font-bold text-shop-dark">暂无订单</p><p class="mt-2 text-sm text-gray-500">去首页选择一个套餐，生成你的第一笔订单吧。</p><a href="index.html#plans" class="mt-5 inline-flex items-center justify-center rounded-full bg-shop-red px-5 py-2.5 text-sm font-bold text-white hover:bg-red-700">去选购</a></div>';
        return;
      }
      ordersList.innerHTML = orders.map(function (order) { return '<article class="rounded-[28px] border border-shop-line bg-gradient-to-br from-white to-shop-soft/40 p-6"><div class="flex flex-col gap-5 lg:flex-row lg:items-start lg:justify-between"><div class="flex-1"><div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"><div><p class="text-sm text-gray-500">订单号：' + order.orderNo + '</p><h3 class="mt-2 text-2xl font-extrabold text-gray-900">' + order.planName + '</h3></div><span class="rounded-full px-4 py-2 text-sm font-bold ' + order.statusClass + '">' + order.statusLabel + '</span></div><div class="mt-5 grid gap-4 sm:grid-cols-2 xl:grid-cols-4"><div class="rounded-2xl bg-white p-4 ring-1 ring-orange-100"><p class="text-xs text-gray-500">套餐流量</p><p class="mt-2 text-lg font-extrabold text-gray-900">' + order.flow + '</p></div><div class="rounded-2xl bg-white p-4 ring-1 ring-orange-100"><p class="text-xs text-gray-500">订单金额</p><p class="mt-2 text-lg font-extrabold text-gray-900">' + order.price + ' 元</p></div><div class="rounded-2xl bg-white p-4 ring-1 ring-orange-100"><p class="text-xs text-gray-500">收货人</p><p class="mt-2 text-lg font-extrabold text-gray-900">' + order.receiverName + '</p></div><div class="rounded-2xl bg-white p-4 ring-1 ring-orange-100"><p class="text-xs text-gray-500">下单时间</p><p class="mt-2 text-lg font-extrabold text-gray-900">' + formatDateTime(order.createdAt) + '</p></div></div><div class="mt-5 rounded-2xl bg-white p-4 ring-1 ring-orange-100"><p class="text-xs text-gray-500">订单说明</p><p class="mt-2 text-sm font-semibold text-gray-800">当前支付方式为微信收款码人工确认。</p><p class="mt-2 text-xs text-gray-500">联系电话：' + order.receiverPhone + (order.remark ? ' · 备注：' + order.remark : '') + '</p></div></div><div class="flex shrink-0 flex-col gap-3">' + buildAction(order) + '<a href="profile.html" class="inline-flex items-center justify-center rounded-full border border-gray-200 px-5 py-2.5 text-sm font-bold text-gray-700 hover:border-shop-red hover:text-shop-red">查看个人中心</a></div></div></article>'; }).join('');
    }

    async function initPage() {
      const currentUser = await window.KasuAuth.getCurrentUserRecord();
      if (!currentUser) { window.location.href = 'login.html'; return; }
      if (currentUser.role === 'admin') { adminLink.classList.remove('hidden'); }
      filterButtons.forEach(function (button) { button.addEventListener('click', function () { activeFilter = button.getAttribute('data-filter'); filterButtons.forEach(function (item) { item.className = 'filter-btn rounded-full border border-gray-200 px-5 py-2.5 text-sm font-bold text-gray-700'; }); button.className = 'filter-btn rounded-full bg-shop-dark px-5 py-2.5 text-sm font-bold text-white'; renderOrders(); }); });
      await renderStats();
      await renderOrders();
    }

    initPage();
  </script>
</body>
</html>
